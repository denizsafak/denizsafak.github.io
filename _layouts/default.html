<!DOCTYPE html>
<html lang="{{ site.lang | default: " en-US" }}">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>

<body>
    <div class="container-lg px-3 my-5 markdown-body">

        <!-- Conditional Header Logic -->
        <h1>
            {% if page.brand %}
            <a href="{{ '/licenses/handybird/' | relative_url }}">{{ page.brand }}</a>
            {% else %}
            <a href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a>
            {% endif %}
        </h1>

        {{ content }}

        {% if site.github.is_project_page %}
        <div class="footer border-top border-gray-light mt-5 pt-3 text-gray">
            This site is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>.
        </div>
        {% endif %}
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js"
        integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
</body>

</html>
